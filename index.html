<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meme Mirror ✨</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <script type="module" src="script.js"></script>
</head>
<body>

  <div class="bg-glow"></div>

  <h1>🎭 Meme Mirror</h1>
  <p class="subtitle">Make a face. Get a meme.</p>

  <div class="container">
    
    <div class="camera-box">
      <video id="video" autoplay muted playsinline></video>
      <div class="live-dot"></div>
      <p class="label">YOU</p>
    </div>

    <div class="meme-box">
      <img id="meme" src="" alt="">
      <p class="label" id="expression-label">Waiting...</p>
    </div>

  </div>

  <footer>made with 💀 + 📸</footer>

</body>
</html>
